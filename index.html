<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>maitreechit. catalog</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&family=Mitr:wght@400;500;600&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'Como';
  src: url('como-400.woff2') format('woff2');
  font-weight: 400;
  font-style: normal;
}
@font-face {
  font-family: 'Como';
  src: url('como-700.woff2') format('woff2');
  font-weight: 700;
  font-style: normal;
}
@font-face {
  font-family: 'Como';
  src: url('como-500.woff2') format('woff2');
  font-weight: 500;
  font-style: normal;
}
:root{--yellow:#FFE400;--blue:#45F1FF;--black:#1A1A1A;--white:#FFFFFF;--gray-bg:#F5F5F5;--gray-mid:#E0E0E0;--gray-text:#888888;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Mitr',sans-serif;background:var(--white);color:var(--black);overflow-x:hidden;height:100vh;overflow:hidden;}
#splash{position:fixed;inset:0;z-index:999;background:var(--yellow);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.4s ease;}
#splash.hide{opacity:0;pointer-events:none;}
.splash-ring{width:72px;height:72px;border-radius:50%;background:var(--black);display:flex;align-items:center;justify-content:center;margin-bottom:20px;animation:popIn 0.5s cubic-bezier(.175,.885,.32,1.275);}
.splash-ring svg{width:36px;height:36px;}
.splash-logo{font-family:'Poppins',sans-serif;font-size:36px;font-weight:900;color:var(--black);text-transform:lowercase;letter-spacing:-1px;margin-bottom:4px;}
.splash-logo em{font-style:normal;border-bottom:3px solid var(--black);}
.splash-tag{font-size:12px;color:rgba(0,0,0,0.5);font-weight:500;letter-spacing:1px;}
@keyframes popIn{from{transform:scale(0)}to{transform:scale(1)}}
.view{position:fixed;inset:0;display:none;flex-direction:column;overflow:hidden;background:var(--white);}
.view.active{display:flex;}
.app-header{background:var(--white);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-top:5px solid var(--yellow);border-bottom:2px solid var(--blue);}


.search-wrap{position:relative;}
.search-input{background:var(--gray-bg);border:1px solid var(--gray-mid);border-radius:20px;padding:8px 14px 8px 32px;color:var(--black);font-family:'Mitr',sans-serif;font-size:13px;width:185px;outline:none;transition:border-color 0.2s;}
.search-input::placeholder{color:var(--gray-text);}
.search-input:focus{border-color:var(--blue);}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--gray-text);font-size:13px;}
/* PICKER */
.picker-body{flex:1;overflow-y:auto;padding:24px 20px 100px;}
.picker-title{font-size:24px;font-weight:600;color:var(--black);line-height:1.25;margin-bottom:4px;}

.picker-sub{font-size:13px;color:var(--gray-text);margin-bottom:22px;font-weight:400;}
.color-matcher-title span{color:var(--gray-text);font-weight:400;}
.series-label{font-family:'Poppins',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--gray-text);margin-bottom:12px;}
.model-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.model-card{background:var(--white);border:1.5px solid var(--gray-mid);border-radius:16px;padding:18px 12px 14px;cursor:pointer;transition:all 0.2s;display:flex;flex-direction:column;align-items:center;gap:8px;}
.model-card:active{transform:scale(0.97);}
.model-card.selected{border-color:var(--black);background:var(--gray-bg);}
.model-icon{width:44px;height:58px;display:flex;align-items:center;justify-content:center;}
.model-icon svg{width:100%;height:100%;color:var(--black);}
.model-name{font-family:'Poppins',sans-serif;font-size:12px;font-weight:700;color:var(--black);text-align:center;line-height:1.3;}
.model-chip{font-family:'Poppins',sans-serif;font-size:10px;background:var(--yellow);color:var(--black);padding:2px 8px;border-radius:8px;font-weight:700;}
.confirm-bar{position:fixed;bottom:0;left:0;right:0;padding:14px 20px 20px;background:var(--white);border-top:1px solid var(--gray-mid);display:none;}
.confirm-btn{width:100%;padding:15px;background:var(--black);color:var(--yellow);border:none;border-radius:14px;font-family:'Poppins',sans-serif;font-size:15px;font-weight:800;cursor:pointer;}
/* CATALOG */
.model-bar{background:var(--yellow);padding:10px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.model-bar-name{font-family:'Poppins',sans-serif;font-size:13px;font-weight:800;color:var(--black);}
.model-bar-color{display:flex;align-items:center;gap:6px;font-size:11px;color:rgba(0,0,0,0.6);font-weight:500;margin-top:2px;}

.change-btn{font-family:'Poppins',sans-serif;font-size:11px;font-weight:700;color:var(--black);background:rgba(0,0,0,0.1);border:none;border-radius:10px;padding:5px 12px;cursor:pointer;}
.filter-scroll{background:var(--white);padding:12px 16px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;border-bottom:1px solid var(--gray-mid);}
.cat-card{flex-shrink:0;width:90px;border-radius:12px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:all 0.2s;position:relative;}
.cat-card.active{border-color:var(--black);}
.cat-card:active{transform:scale(0.96);}
.cat-card-img{width:90px;height:70px;object-fit:cover;display:block;background:var(--gray-bg);}
.cat-card-img-placeholder{width:90px;height:70px;background:var(--gray-bg);display:flex;align-items:center;justify-content:center;}
.cat-card-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.55);color:white;font-size:10px;font-weight:700;padding:4px 6px;text-align:center;font-family:'Poppins',sans-serif;text-transform:lowercase;}
.cat-all-btn{flex-shrink:0;width:90px;height:70px;border-radius:12px;border:2px solid var(--gray-mid);background:var(--white);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transition:all 0.2s;font-family:'Poppins',sans-serif;font-size:11px;font-weight:700;color:var(--gray-text);}
.cat-all-btn.active{border-color:var(--black);background:var(--black);color:var(--yellow);}
.filter-scroll::-webkit-scrollbar{display:none;}
.filter-chip{padding:6px 14px;border-radius:20px;font-family:'Mitr',sans-serif;font-size:12px;font-weight:500;border:1.5px solid var(--gray-mid);background:var(--white);color:var(--gray-text);cursor:pointer;white-space:nowrap;transition:all 0.15s;flex-shrink:0;}
.filter-chip.active{background:var(--black);color:var(--yellow);border-color:var(--black);}
.filter-chip.brand-chip.active{background:var(--blue);color:var(--black);border-color:var(--blue);}
.filter-divider{width:1px;background:var(--gray-mid);margin:4px 2px;flex-shrink:0;}
.results-row{padding:8px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid var(--gray-mid);}
.results-count{font-size:12px;color:var(--gray-text);}
.results-count strong{color:var(--black);}
.color-match-badge{font-family:'Poppins',sans-serif;font-size:11px;font-weight:700;background:var(--yellow);color:var(--black);padding:3px 10px;border-radius:10px;display:none;align-items:center;}
.color-match-badge.show{display:flex;}
.catalog-grid{flex:1;overflow-y:auto;padding:12px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px;align-content:start;}
.prod-card{background:var(--white);border:1.5px solid var(--gray-mid);border-radius:14px;overflow:hidden;cursor:pointer;transition:all 0.15s;position:relative;}
.prod-card:active{transform:scale(0.97);}


.prod-img{background:var(--gray-bg);aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.prod-img img{width:100%;height:100%;object-fit:cover;}
.prod-img-placeholder{width:55%;height:55%;opacity:0.15;}
.prod-img-placeholder svg{width:100%;height:100%;}
.prod-badge{position:absolute;top:8px;left:8px;padding:3px 7px;border-radius:7px;font-family:'Poppins',sans-serif;font-size:9px;font-weight:800;text-transform:uppercase;}
.badge-new{background:var(--blue);color:var(--black);}
.badge-hot{background:var(--yellow);color:var(--black);}
.badge-sale{background:#FF4444;color:white;}
.prod-info{padding:10px;}
.prod-brand{font-family:'Poppins',sans-serif;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--gray-text);margin-bottom:2px;}
.prod-name{font-size:13px;font-weight:600;line-height:1.3;margin-bottom:4px;}
.prod-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px;}
.prod-tag{font-size:9px;font-weight:500;padding:2px 6px;border-radius:6px;background:var(--gray-bg);color:var(--gray-text);}
.prod-bottom{display:flex;align-items:center;justify-content:space-between;}
.prod-price{font-family:'Poppins',sans-serif;font-size:15px;font-weight:900;color:var(--black);}
.prod-price sup{font-size:9px;font-weight:600;}
.prod-colors{display:flex;gap:3px;}
.prod-color-dot{width:10px;height:10px;border-radius:50%;border:1px solid rgba(0,0,0,0.15);}
.no-results{grid-column:1/-1;text-align:center;padding:50px 20px;}
.no-results h3{font-size:16px;font-weight:600;margin-bottom:6px;}
.no-results p{font-size:13px;color:var(--gray-text);}
.loading-state{grid-column:1/-1;text-align:center;padding:50px 20px;}
.loading-dots{display:flex;gap:8px;justify-content:center;margin-bottom:12px;}
.loading-dot{width:8px;height:8px;border-radius:50%;background:var(--yellow);animation:bounce 0.8s ease infinite;}
.loading-dot:nth-child(2){animation-delay:0.15s;}
.loading-dot:nth-child(3){animation-delay:0.3s;}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-8px)}}
/* MODAL */
.modal-bg{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.5);display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.modal-bg.open{opacity:1;pointer-events:all;}
.modal-sheet{background:var(--white);width:100%;max-height:88vh;border-radius:20px 20px 0 0;overflow-y:auto;transform:translateY(100%);transition:transform 0.3s cubic-bezier(.32,0,.67,0);position:relative;}
.modal-bg.open .modal-sheet{transform:translateY(0);}
.modal-handle{width:32px;height:4px;border-radius:2px;background:var(--gray-mid);margin:10px auto;}
.modal-close{position:absolute;top:12px;right:16px;background:var(--gray-bg);border:none;border-radius:50%;width:30px;height:30px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Poppins',sans-serif;font-weight:700;}
.modal-hero{display:none;}
.hero-placeholder{display:none;}
.modal-body{padding:16px 18px 36px;}
.modal-inner{display:flex;gap:16px;align-items:flex-start;margin-bottom:16px;}
.overlay-section{background:var(--gray-bg);border-radius:14px;padding:16px;margin-bottom:16px;}
.overlay-title{font-size:12px;font-weight:700;color:var(--gray-text);text-transform:uppercase;letter-spacing:1px;font-family:'Poppins',sans-serif;margin-bottom:12px;}
.overlay-colors{display:flex;gap:8px;margin-bottom:14px;}
.overlay-color-btn{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;background:none;border:none;}
.overlay-swatch{width:32px;height:32px;border-radius:50%;border:2.5px solid transparent;transition:all 0.2s;box-shadow:0 0 0 1px rgba(0,0,0,0.12);}
.overlay-color-btn.active .overlay-swatch{border-color:var(--black);}
.overlay-color-btn span{font-size:10px;color:var(--gray-text);font-weight:500;}
.overlay-preview{position:relative;width:100%;max-width:280px;margin:0 auto;aspect-ratio:3/4;display:flex;align-items:center;justify-content:center;}
.overlay-phone{position:absolute;width:75%;height:auto;z-index:1;}
.overlay-case{position:absolute;width:75%;height:auto;z-index:2;}
.modal-img-side{width:160px;flex-shrink:0;border-radius:10px;overflow:hidden;background:var(--gray-bg);}
.slideshow-wrap{position:relative;width:160px;}
.slideshow-main{width:160px;aspect-ratio:4/3;border-radius:10px;overflow:hidden;background:var(--gray-bg);position:relative;}
.slideshow-main img{width:100%;height:100%;object-fit:cover;display:block;}
.slide-dots{display:flex;gap:4px;justify-content:center;margin-top:6px;}
.slide-dot{width:5px;height:5px;border-radius:50%;background:var(--gray-mid);cursor:pointer;transition:background 0.2s;}
.slide-dot.active{background:var(--black);}
.slide-arrows{position:absolute;top:50%;transform:translateY(-50%);width:100%;display:flex;justify-content:space-between;padding:0 4px;pointer-events:none;}
.slide-arrow{background:rgba(0,0,0,0.4);color:white;border:none;border-radius:50%;width:22px;height:22px;font-size:11px;cursor:pointer;pointer-events:all;display:flex;align-items:center;justify-content:center;}
.modal-img-side img{width:100%;height:100%;object-fit:cover;}
.modal-img-placeholder-side{width:100%;height:100%;display:flex;align-items:center;justify-content:center;opacity:0.15;}
.modal-info-side{flex:1;}
.modal-brand{font-family:'Poppins',sans-serif;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--gray-text);margin-bottom:3px;}
.modal-name{font-size:20px;font-weight:600;line-height:1.2;margin-bottom:3px;}
.modal-model-txt{font-family:'Poppins',sans-serif;font-size:12px;color:var(--gray-text);margin-bottom:12px;}
.modal-price{font-family:'Poppins',sans-serif;font-size:26px;font-weight:900;margin-bottom:14px;}
.modal-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;}
.modal-tag{font-size:11px;font-weight:500;padding:4px 10px;border-radius:10px;background:var(--gray-bg);color:var(--black);}
.match-section{display:none;}
.match-title{font-family:'Poppins',sans-serif;font-size:11px;font-weight:700;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.match-item{border-radius:10px;padding:8px;display:flex;align-items:center;gap:8px;border:1.5px solid rgba(255,255,255,0.08);}
.match-item.good{background:rgba(255,228,0,0.12);border-color:rgba(255,228,0,0.3);}
.match-item.neutral{background:rgba(255,255,255,0.04);}
.match-dot-big{width:28px;height:28px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.2);flex-shrink:0;}
.match-color-name{font-family:'Poppins',sans-serif;font-size:11px;font-weight:700;color:var(--white);}
.match-rating{font-size:10px;color:rgba(255,255,255,0.45);}
.match-stars{color:var(--yellow);font-size:10px;font-family:'Poppins',sans-serif;}
.section-label{font-family:'Poppins',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--gray-text);margin-bottom:10px;}
.feature-list{list-style:none;margin-bottom:18px;}
.feature-list li{font-size:13px;padding:8px 0;border-bottom:1px solid var(--gray-mid);display:flex;gap:8px;align-items:flex-start;font-weight:400;}
.feature-list li::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--yellow);margin-top:5px;flex-shrink:0;}
.modal-cta{display:none;}
</style>

<body>

<div id="splash">
  <div class="splash-ring">
    <svg viewBox="0 0 24 24" fill="#FFE400" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>

<!-- PICKER VIEW -->
<div id="viewPicker" class="view">
  <div class="app-header">
    <img src="logo.svg" alt="maitreechit." style="height:60px;object-fit:contain;">
    <div style="font-family:'Poppins',sans-serif;font-size:11px;color:var(--gray-text);font-weight:600">product catalog</div>
  </div>
  <div class="picker-body">

        <div class="model-name">iPhone 17</div>

        <div class="model-name">iPhone 17 Plus</div>
        <div class="model-chip">6.7"</div>
      </div>
      <div class="model-card" id="card-iPhone 17 Pro" onclick="previewModel('iPhone 17 Pro',this)">
        <div class="model-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="6" y="2" width="12" height="20" rx="3"/><path d="M9.5 5h5M10.5 6.5h3"/><circle cx="12" cy="18.5" r="0.8" fill="currentColor"/></svg></div>

  </div>
</div>

<!-- CATALOG VIEW -->
<div id="viewCatalog" class="view">
  <div class="app-header">
    <img src="logo.svg" alt="maitreechit." style="height:60px;object-fit:contain;">
    <div class="search-wrap">
      <span class="search-icon">&#128269;</span>
      <input class="search-input" type="text" placeholder="ค้นหาสินค้า..." id="searchInput" oninput="applyFilters()">
    </div>
  </div>
  <div class="model-bar">
    <div>
      <div class="model-bar-name" id="barModelName"></div>
      <div class="model-bar-color">
        
        <span id="barColorName"></span>
      </div>
    </div>
    <button class="change-btn" onclick="showView('viewPicker')">เปลี่ยนรุ่น</button>
  </div>
  <div class="filter-scroll" id="catFilterRow">
    <button class="cat-all-btn active" data-cat="all" onclick="setCatCard(this,'all')">
      <span style="font-size:16px">▤</span>
      <span>ทั้งหมด</span>
    </button>
    <div id="catCards" style="display:contents"></div>

  </div>
  <div class="catalog-grid" id="catalogGrid">
    <div class="loading-state"><div class="loading-dots"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div><div style="font-size:13px;color:var(--gray-text)">กำลังโหลดสินค้า...</div></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg" onclick="handleModalClick(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <button class="modal-close" onclick="closeModal()">&#10005;</button>
    <div class="modal-body">

let state={model:'',phoneColor:'',phonehex:'',cat:'all',tag:'',brand:'',search:''};
let PRODUCTS=[];
let pendingModel='';

async function loadData(){
  try{
    let allRecords=[];
    let offset='';
    let maxPages=10;
    do{
      const url=`https://api.airtable.com/v0/${AIRTABLE_BASE}/${AIRTABLE_TABLE}?pageSize=100${offset?'&offset='+offset:''}`;
      const res=await fetch(url,{headers:{Authorization:`Bearer ${AIRTABLE_TOKEN}`}});
      const data=await res.json();
      if(data.error){throw new Error(data.error.message);}
      allRecords=[...allRecords,...(data.records||[])];
      offset=(data.records&&data.records.length===100&&data.offset)?data.offset:'';
      maxPages--;
    }while(offset&&maxPages>0);
    if(!allRecords.length){PRODUCTS=FALLBACK;renderAllFilters();return;}
    PRODUCTS=allRecords.map((rec,i)=>{
      const f=rec.fields;
      let colors=[];try{colors=JSON.parse(f.colors_json||'[]');}catch(e){}
      return{id:i+1,brand:f.brand||'',name:f.name||'',model:f.model_display||'',
        models:(f.compatible_models||'').split('|').map(m=>m.trim()).filter(Boolean),
        cat:f.category||'',price:parseInt(f.price)||0,badge:f.badge||null,
        image:f.image_url||'',image2:f.image_url_2||'',image3:f.image_url_3||'',image4:f.image_url_4||'',cutout:f.case_cutout_url||'',
        tags:(f.tags||'').split('|').map(t=>t.trim()).filter(Boolean),
        colors,features:[f.f1,f.f2,f.f3,f.f4].filter(Boolean)};
    });
    renderAllFilters();
  }catch(e){console.warn('Airtable load failed, using fallback:',e);PRODUCTS=FALLBACK;}
  renderAllFilters();
}

function showView(id){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById(id).classList.add('active');}


function previewModel(model,el){
  document.querySelectorAll('.model-card').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
  if(pendingModel!==model){}
  pendingModel=model;
  
  
  document.getElementById('confirmBar').style.display='block';
  document.getElementById('confirmLabel').textContent=model;
}

function goToCatalog(){
  if(!pendingModel)return;
  state.model=pendingModel;
  state.cat='all';state.tag='';state.brand='';state.search='';
  document.getElementById('barModelName').textContent=state.model;

  document.querySelectorAll('.cat-card,.cat-all-btn').forEach(c=>c.classList.toggle('active',c.dataset.cat==='all'));
  document.querySelectorAll('[data-tag],[data-brand]').forEach(c=>c.classList.remove('active'));
  document.getElementById('searchInput').value='';
  document.getElementById('confirmBar').style.display='none';
  showView('viewCatalog');
  renderGrid();
}

function renderAllFilters(){
  // category cards - use first product image per category
  const cats=[...new Set(PRODUCTS.map(p=>p.cat).filter(Boolean))].sort();
  const catEl=document.getElementById('catCards');
  if(catEl) catEl.innerHTML=cats.map(c=>{
    const first=PRODUCTS.find(p=>p.cat===c&&p.image);
    return `<div class="cat-card" data-cat="${c}" onclick="setCatCard(this,'${c}')">
      ${first
        ? `<img class="cat-card-img" src="${first.image}" alt="${c}">`
        : `<div class="cat-card-img-placeholder"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/></svg></div>`
      }
      <div class="cat-card-label">${c}</div>
    </div>`;
  }).join('');

  // tags
  const allTags=[...new Set(PRODUCTS.flatMap(p=>p.tags).filter(Boolean))].sort();
  const tagEl=document.getElementById('tagChips');
  const tagDiv=document.getElementById('tagDivider');
  if(tagEl&&allTags.length){
    tagEl.innerHTML=allTags.map(t=>
      `<button class="filter-chip" data-tag="${t}" onclick="setTag(this)">${t}</button>`
    ).join('');
    if(tagDiv) tagDiv.style.display='';
  }

  // brands
  const brands=[...new Set(PRODUCTS.map(p=>p.brand).filter(Boolean))].sort();
  const brandEl=document.getElementById('brandChips');
  const brandDiv=document.getElementById('brandDivider');
  if(brandEl&&brands.length){
    brandEl.innerHTML=brands.map(b=>
      `<button class="filter-chip brand-chip" data-brand="${b}" onclick="setBrand(this)">${b}</button>`
    ).join('');
    if(brandDiv) brandDiv.style.display='';
  }
}
function setCatCard(el,cat){
  state.cat=cat;
  document.querySelectorAll('.cat-card,.cat-all-btn').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  renderGrid();
}
function setCat(btn){state.cat=btn.dataset.cat;document.querySelectorAll('[data-cat]').forEach(c=>c.classList.toggle('active',c===btn));renderGrid();}
function setTag(btn){const t=btn.dataset.tag;state.tag=state.tag===t?'':t;document.querySelectorAll('[data-tag]').forEach(c=>c.classList.toggle('active',c.dataset.tag===state.tag));renderGrid();}
function setBrand(btn){const b=btn.dataset.brand;state.brand=state.brand===b?'':b;document.querySelectorAll('[data-brand]').forEach(c=>c.classList.toggle('active',c.dataset.brand===state.brand));renderGrid();}
function applyFilters(){state.search=document.getElementById('searchInput').value.toLowerCase();renderGrid();}

function isMatch(p){if(!state.phoneColor)return false;return p.colors.some(c=>c.matchColors&&c.matchColors.includes(state.phoneColor));}

function getFiltered(){
  return PRODUCTS.filter(p=>{
    if(!p.models.includes(state.model))return false;
    if(state.cat!=='all'&&p.cat!==state.cat)return false;
    if(state.tag&&!p.tags.includes(state.tag))return false;
    if(state.brand&&p.brand!==state.brand)return false;
    if(state.search){const s=state.search;if(!p.name.toLowerCase().includes(s)&&!p.brand.toLowerCase().includes(s)&&!p.tags.join(' ').includes(s))return false;}
    return true;
  }).sort((a,b)=>(isMatch(b)?1:0)-(isMatch(a)?1:0));
}

function renderGrid(){
  const list=getFiltered();
  document.getElementById('resultsCount').innerHTML=`แสดง <strong>${list.length}</strong> รายการ`;
  if(!list.length){document.getElementById('catalogGrid').innerHTML='<div class="no-results"><h3>ไม่พบสินค้า</h3><p>ลองเปลี่ยน filter หรือ keyword นะคะ</p></div>';return;}
  document.getElementById('catalogGrid').innerHTML=list.map(p=>{
    const m=false;
    const imgHtml=p.image?`<img src="${p.image}" alt="${p.name}" onerror="this.style.display='none'">`:`<div class="prod-img-placeholder"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 1.01L7 1c-1.1 0-2 .9-2 2v18c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V3c0-1.1-.9-1.99-2-1.99zM17 19H7V5h10v14z"/></svg></div>`;
    return`<div class="prod-card${m?' color-match':''}" onclick="openModal(${p.id})">
      <div class="prod-img">${imgHtml}${p.badge?`<div class="prod-badge badge-${p.badge}">${p.badge}</div>`:''}</div>
      <div class="prod-info">
        <div class="prod-brand">${p.brand}</div>
        <div class="prod-name">${p.name}</div>
        <div class="prod-tags">${p.tags.map(t=>`<span class="prod-tag">${t}</span>`).join('')}</div>
        <div class="prod-bottom">
          <div class="prod-price">&#3647;${p.price.toLocaleString()}<sup>.-</sup></div>
          <div class="prod-colors">${p.colors.map(c=>`<div class="prod-color-dot" style="background:${c.hex}"></div>`).join('')}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function openModal(id){
  const p=PRODUCTS.find(x=>x.id===id);if(!p)return;
  const hero=document.getElementById('mHero');
  const slides=[p.image,p.image2,p.image3,p.image4].filter(Boolean);
  if(slides.length>0){
    hero.innerHTML=`<div class="slideshow-wrap">
      <div class="slideshow-main" id="slideshowMain">
        <img src="${slides[0]}" alt="${p.name}" id="slideImg">
        ${slides.length>1?`<div class="slide-arrows"><button class="slide-arrow" onclick="prevSlide()">&#8249;</button><button class="slide-arrow" onclick="nextSlide()">&#8250;</button></div>`:''}
      </div>
      ${slides.length>1?`<div class="slide-dots">${slides.map((_,i)=>`<div class="slide-dot ${i===0?'active':''}" onclick="goSlide(${i})"></div>`).join('')}</div>`:''}
    </div>`;
    window._slides=slides;
    window._slideIdx=0;
  } else {
    hero.innerHTML=`<div class="modal-img-placeholder-side"><svg viewBox="0 0 24 24" fill="currentColor" width="40" height="40"><path d="M17 1.01L7 1c-1.1 0-2 .9-2 2v18c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V3c0-1.1-.9-1.99-2-1.99zM17 19H7V5h10v14z"/></svg></div>`;
  }
  document.getElementById('mBrand').textContent=p.brand;
  document.getElementById('mName').textContent=p.name;
  document.getElementById('mModel').textContent=p.model;
  document.getElementById('mPrice').textContent=`฿${p.price.toLocaleString()}.-`;
  document.getElementById('mTags').innerHTML=p.tags.map(t=>`<span class="modal-tag">${t}</span>`).join('');
  document.getElementById('mFeatures').innerHTML=p.features.map(f=>`<li>${f}</li>`).join('');

  // Overlay section
  const colors = MODEL_COLORS[state.model] || [];
  const overlaySection = document.getElementById('overlaySection');
  if(p.cutout && colors.length){
    overlaySection.style.display='block';
    document.getElementById('overlayCase').src = p.cutout;
    // Render color buttons
    document.getElementById('overlayColors').innerHTML = colors.filter(c=>c.img).map((c,i)=>`
      <button class="overlay-color-btn ${i===0?'active':''}" onclick="selectOverlayColor(this,'${c.img}')" style="display:flex;align-items:center;gap:8px;background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:20px;border:1.5px solid ${i===0?'var(--black)':'var(--gray-mid)'}">
        <div style="width:20px;height:20px;border-radius:50%;background:${c.hex};flex-shrink:0"></div>
        <span style="font-size:12px;font-family:'Poppins',sans-serif;font-weight:600">${c.color}</span>
      </button>`).join('');
    // Set first color
    if(colors[0].img) document.getElementById('overlayPhone').src = colors[0].img;
    else overlaySection.style.display='none';
  } else {
    overlaySection.style.display='none';
  }
  document.getElementById('modalBg').classList.add('open');
  document.body.style.overflow='hidden';
}
function goSlide(idx){
  const slides=window._slides||[];
  if(!slides.length)return;
  window._slideIdx=idx;
  const img=document.getElementById('slideImg');
  if(img)img.src=slides[idx];
  document.querySelectorAll('.slide-dot').forEach((d,i)=>d.classList.toggle('active',i===idx));
}
function nextSlide(){
  const slides=window._slides||[];
  goSlide((window._slideIdx+1)%slides.length);
}
function prevSlide(){
  const slides=window._slides||[];
  goSlide((window._slideIdx-1+slides.length)%slides.length);
}
function selectOverlayColor(btn, imgUrl){
  document.querySelectorAll('.overlay-color-btn').forEach(b=>b.style.borderColor='var(--gray-mid)');
  btn.style.borderColor='var(--black)';
  if(imgUrl) document.getElementById('overlayPhone').src = imgUrl;
}
function handleModalClick(e){if(e.target===document.getElementById('modalBg'))closeModal();}
function closeModal(){document.getElementById('modalBg').classList.remove('open');document.body.style.overflow='';}

window.addEventListener('load',async()=>{
  await loadData();
  setTimeout(()=>{
    document.getElementById('splash').classList.add('hide');
    setTimeout(()=>document.getElementById('splash').remove(),400);
    showView('viewPicker');
  },1400);
});
</script>
