<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>maitreechit. catalog</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Mitr:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--yellow:#FFE400;--blue:#45F1FF;--black:#1A1A1A;--white:#FFFFFF;--bg:#F7F7F5;--border:#E8E6E1;--muted:#A09E99;--sidebar-w:220px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Mitr',sans-serif;background:var(--bg);color:var(--black);}

#splash{position:fixed;inset:0;z-index:999;background:#FFFEF5;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.5s ease;}
#splash.hide{opacity:0;pointer-events:none;}
.splash-tag{font-size:11px;color:var(--muted);font-weight:400;letter-spacing:2px;margin-top:14px;}

.app{display:flex;height:100vh;opacity:0;transition:opacity 0.4s ease;}
.app.show{opacity:1;}

.sidebar{width:var(--sidebar-w);background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;scrollbar-width:none;transition:width 0.25s,padding 0.25s,opacity 0.25s;}
.sidebar::-webkit-scrollbar{display:none;}
.sidebar.collapsed{width:0;padding:0;overflow:hidden;opacity:0;border-right:none;}
.side-top{padding:24px 20px 16px;border-bottom:1px solid var(--border);}
.side-logo{height:44px;object-fit:contain;display:block;margin-bottom:4px;}
.side-sub{font-family:'Poppins',sans-serif;font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;font-weight:500;}

.side-section{padding:16px 20px;}
.side-section+.side-section{border-top:1px solid var(--border);}
.side-label{font-size:10px;color:var(--muted);font-weight:500;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;font-family:'Poppins',sans-serif;}
.chip-wrap{display:flex;flex-wrap:wrap;gap:6px;}
.chip{font-size:11px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all 0.15s;background:transparent;font-family:'Mitr',sans-serif;font-weight:400;white-space:nowrap;}
.chip:active{transform:scale(0.95);}
.chip.on{background:var(--black);color:var(--white);border-color:var(--black);}
.chip.brand-on{background:var(--blue);color:var(--black);border-color:var(--blue);}

.side-bottom{margin-top:auto;padding:16px 20px;border-top:1px solid var(--border);text-align:center;}
.side-bottom-tag{font-size:10px;color:var(--muted);letter-spacing:1.5px;font-weight:300;}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

.topbar{padding:12px 24px;display:flex;align-items:center;justify-content:space-between;background:var(--white);border-bottom:1px solid var(--border);flex-shrink:0;}
.topbar-info{font-size:12px;color:var(--muted);font-family:'Poppins',sans-serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.topbar-info strong{color:var(--black);font-weight:600;}
.search-wrap{position:relative;}
.search-input{background:var(--bg);border:1px solid var(--border);border-radius:24px;padding:8px 16px 8px 36px;font-family:'Mitr',sans-serif;font-size:12px;width:220px;outline:none;color:var(--black);transition:border-color 0.2s;}
.search-input::placeholder{color:var(--muted);}
.search-input:focus{border-color:var(--black);}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;}

.scroll-area{flex:1;overflow-y:auto;scroll-behavior:smooth;scrollbar-width:none;}
.scroll-area::-webkit-scrollbar{display:none;}

.banner-track{display:flex;gap:12px;padding:14px 24px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;}
.banner-track::-webkit-scrollbar{display:none;}
.banner-card{min-width:260px;height:110px;border-radius:14px;overflow:hidden;position:relative;flex-shrink:0;cursor:pointer;background:var(--black);}
.banner-card img{width:100%;height:100%;object-fit:cover;display:block;}
.banner-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;}
.banner-placeholder .b-brand{font-family:'Poppins',sans-serif;font-size:20px;font-weight:700;color:var(--white);text-transform:uppercase;letter-spacing:3px;}
.banner-placeholder .b-tag{font-size:11px;color:rgba(255,255,255,0.5);letter-spacing:1px;}
.banner-badge{position:absolute;bottom:12px;left:12px;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);color:var(--white);font-size:10px;font-family:'Poppins',sans-serif;font-weight:500;padding:4px 12px;border-radius:12px;letter-spacing:0.5px;}

.grid{padding:4px 24px 40px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px;align-content:start;}

.card{background:var(--white);border-radius:14px;overflow:hidden;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;border:1px solid var(--border);}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.06);}
.card:active{transform:scale(0.98);}
.card-img{aspect-ratio:3/4;background:var(--bg);position:relative;overflow:hidden;}
.card-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.3s;}
.card:hover .card-img img{transform:scale(1.03);}
.card-img .placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:32px;color:var(--border);}
.card-badge{position:absolute;top:10px;left:10px;font-size:9px;font-weight:600;padding:3px 10px;border-radius:10px;font-family:'Poppins',sans-serif;text-transform:uppercase;letter-spacing:0.5px;}
.badge-hot{background:var(--yellow);color:var(--black);}
.badge-new{background:var(--blue);color:var(--black);}
.badge-sale{background:#FF4444;color:var(--white);}
.card-info{padding:12px 14px;}
.card-brand{font-family:'Poppins',sans-serif;font-size:9px;font-weight:600;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;}
.card-name{font-size:13px;font-weight:500;line-height:1.35;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:35px;}
.card-bottom{display:flex;align-items:center;justify-content:space-between;}
.card-price{font-family:'Poppins',sans-serif;font-size:15px;font-weight:600;}
.card-dots{display:flex;gap:3px;}
.card-dot{width:10px;height:10px;border-radius:50%;border:1px solid var(--border);}

.no-results{grid-column:1/-1;text-align:center;padding:60px 20px;}
.no-results h3{font-size:16px;font-weight:500;margin-bottom:6px;}
.no-results p{font-size:13px;color:var(--muted);}

.modal-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.4);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal-box{background:var(--white);width:90%;max-width:680px;max-height:85vh;border-radius:20px;overflow-y:auto;transform:scale(0.95);transition:transform 0.3s;scrollbar-width:none;}
.modal-box::-webkit-scrollbar{display:none;}
.modal-overlay.open .modal-box{transform:scale(1);}
.modal-close{position:sticky;top:12px;float:right;margin:12px 16px 0 0;background:var(--bg);border:none;border-radius:50%;width:32px;height:32px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;}
.modal-body{padding:20px 24px 32px;}
.modal-hero{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;margin-bottom:16px;scrollbar-width:none;}
.modal-hero::-webkit-scrollbar{display:none;}
.modal-hero img{width:140px;aspect-ratio:3/4;object-fit:cover;border-radius:12px;background:var(--bg);flex-shrink:0;cursor:pointer;}
.modal-brand{font-family:'Poppins',sans-serif;font-size:10px;font-weight:600;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;}
.modal-name{font-size:22px;font-weight:500;line-height:1.2;margin-bottom:4px;}
.modal-model{font-family:'Poppins',sans-serif;font-size:12px;color:var(--muted);margin-bottom:14px;}
.modal-price{font-family:'Poppins',sans-serif;font-size:28px;font-weight:600;margin-bottom:16px;}
.modal-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px;}
.modal-tag{font-size:11px;padding:4px 12px;border-radius:12px;background:var(--bg);color:var(--black);font-weight:400;}
.detail-label{font-family:'Poppins',sans-serif;font-size:10px;font-weight:600;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;}
.feature-list{list-style:none;margin-bottom:20px;}
.feature-list li{font-size:13px;padding:10px 0;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:flex-start;font-weight:400;color:var(--black);}
.feature-list li::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--yellow);margin-top:6px;flex-shrink:0;}
.overlay-box{background:var(--bg);border-radius:14px;padding:16px;margin-bottom:20px;}
.overlay-label{font-family:'Poppins',sans-serif;font-size:10px;font-weight:600;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;}
.overlay-content{display:flex;gap:14px;align-items:center;}
.overlay-colors{display:flex;flex-direction:column;gap:8px;flex-shrink:0;}
.overlay-btn{display:flex;align-items:center;gap:8px;background:none;border:1.5px solid var(--border);cursor:pointer;padding:5px 10px;border-radius:20px;transition:border-color 0.15s;}
.overlay-btn.on{border-color:var(--black);}
.overlay-btn .swatch{width:18px;height:18px;border-radius:50%;flex-shrink:0;}
.overlay-btn .lbl{font-size:11px;font-family:'Poppins',sans-serif;font-weight:500;color:var(--black);}
.overlay-container-box{position:relative;width:280px;max-width:100%;flex-shrink:0;margin:0 auto;aspect-ratio:1/1;}
.overlay-container-box img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain;}
#overlayPhone{z-index:1;}
#overlayCase{z-index:2;}

.lightbox{position:fixed;inset:0;z-index:600;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.lightbox.open{opacity:1;pointer-events:all;}
.lightbox img{max-width:80%;max-height:80vh;object-fit:contain;border-radius:12px;}
.lb-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.15);border:none;color:white;width:44px;height:44px;border-radius:50%;font-size:20px;cursor:pointer;}
.lb-prev{left:20px;}
.lb-next{right:20px;}
.lb-close{position:absolute;top:20px;right:20px;background:rgba(255,255,255,0.15);border:none;color:white;width:36px;height:36px;border-radius:50%;font-size:16px;cursor:pointer;}

@media(max-width:768px){
  .sidebar{position:fixed;top:0;left:0;bottom:0;z-index:400;width:260px;transform:translateX(-100%);transition:transform 0.3s;box-shadow:none;}
  .sidebar.open{transform:translateX(0);box-shadow:4px 0 20px rgba(0,0,0,0.1);}
  .sidebar.collapsed{transform:translateX(-100%);}
  .side-overlay{display:none;position:fixed;inset:0;z-index:399;background:rgba(0,0,0,0.3);}
  .side-overlay.show{display:block;}
  .grid{grid-template-columns:repeat(2,1fr);gap:10px;padding:4px 16px 40px;}
  .banner-card{min-width:240px;height:120px;}
  .topbar-info{font-size:11px;}
  .search-input{width:160px;font-size:11px;}
}
</style>
<script>window.AIRTABLE_TOKEN=window.AIRTABLE_TOKEN||"patshmTUPF7zkV5sI.4e0ebeaf81f0371f19d82fdf1d33a2e2346fb00c654d773289409a15961d2f16";</script>
</head>
<body>

<div id="splash">
  <img src="logo.svg" alt="maitreechit." style="height:72px;object-fit:contain;">
  <div class="splash-tag">always your friend.</div>
</div>

<div class="app" id="app">
  <div class="side-overlay" id="sideOverlay" onclick="toggleSidebar()"></div>
  <aside class="sidebar" id="sidebar">
    <div class="side-top">
      <img src="logo.svg" alt="maitreechit." class="side-logo">
      <div class="side-sub">product catalog</div>
    </div>

    <div class="side-section">
      <div class="side-label">รุ่น iPhone</div>
      <div class="chip-wrap" id="modelChips">
        <div class="chip on" onclick="setModel(this,'iPhone 17 Pro Max')">17 Pro Max</div>
        <div class="chip" onclick="setModel(this,'iPhone 17 Pro')">17 Pro</div>
        <div class="chip" onclick="setModel(this,'iPhone 17')">17</div>
        <div class="chip" onclick="setModel(this,'iPhone 17 Air')">17 Air</div>
      </div>
    </div>

    <div class="side-section">
      <div class="side-label">ประเภท</div>
      <div class="chip-wrap" id="tagChips"></div>
    </div>

    <div class="side-section">
      <div class="side-label">แบรนด์</div>
      <div class="chip-wrap" id="brandChips"></div>
    </div>

    <div class="side-bottom">
      <div class="side-bottom-tag">always your friend.</div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button onclick="toggleSidebar()" style="background:none;border:1px solid var(--border);border-radius:8px;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--muted);flex-shrink:0;transition:all 0.15s;" title="ซ่อน/แสดงตัวกรอง">&#9776;</button>
        <div class="topbar-info" id="topInfo">กำลังโหลด...</div>
      </div>
      <div class="search-wrap">
        <span class="search-icon">&#128269;</span>
        <input class="search-input" type="text" placeholder="ค้นหาสินค้า..." id="searchInput" oninput="applyFilters()">
      </div>
    </div>
    <div class="scroll-area">
      <div class="banner-track" id="bannerTrack"></div>
      <div class="grid" id="grid"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">&#10005;</button>
    <div class="modal-body">
      <div class="modal-hero" id="mHero"></div>
      <div class="modal-brand" id="mBrand"></div>
      <div class="modal-name" id="mName"></div>
      <div class="modal-model" id="mModel"></div>
      <div class="modal-price" id="mPrice"></div>
      <div class="modal-tags" id="mTags"></div>

      <div class="overlay-box" id="overlaySection" style="display:none;">
        <div class="overlay-label">ลองใส่เคสกับเครื่องของคุณ</div>
        <div class="overlay-content">
          <div class="overlay-colors" id="overlayColors"></div>
          <div class="overlay-container-box">
            <img id="overlayPhone" src="">
            <img id="overlayCase" src="">
          </div>
        </div>
      </div>

      <div class="detail-label">รายละเอียด</div>
      <ul class="feature-list" id="mFeatures"></ul>
    </div>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lb-close" onclick="closeLightbox()">&#10005;</button>
  <button class="lb-btn lb-prev" onclick="event.stopPropagation();prevLB()">&#8249;</button>
  <img id="lbImg" src="">
  <button class="lb-btn lb-next" onclick="event.stopPropagation();nextLB()">&#8250;</button>
</div>

<script>
const AIRTABLE_BASE='appuDsqo3ODV9r4Ym';
const AIRTABLE_TABLE='tblpHdM3GcpPjUix3';
const AIRTABLE_TOKEN=window.AIRTABLE_TOKEN||'';

const MODEL_COLORS={
  'iPhone 17 Pro':[
    {color:'เงิน',hex:'#E6E2D8',img:'https://i.ibb.co/TDPch9xT/Mockup-05-1.png'},
    {color:'น้ำเงินเข้ม',hex:'#2B3A52',img:'https://i.ibb.co/tTy7cYs2/Mockup-03.png'},
    {color:'ส้มคอสมิก',hex:'#C0693A',img:'https://i.ibb.co/qMFddJhn/Mockup-04.png'}
  ],
  'iPhone 17 Pro Max':[
    {color:'เงิน',hex:'#E6E2D8',img:'https://i.ibb.co/TDPch9xT/Mockup-05-1.png'},
    {color:'น้ำเงินเข้ม',hex:'#2B3A52',img:'https://i.ibb.co/tTy7cYs2/Mockup-03.png'},
    {color:'ส้มคอสมิก',hex:'#C0693A',img:'https://i.ibb.co/qMFddJhn/Mockup-04.png'}
  ],
};

const BANNERS=[
  {brand:'SKINARMA',text:'protect with style.',bg:'linear-gradient(135deg,#1A1A1A,#333)',img:'https://i.ibb.co/ccHcgZ0N/Homepage-Banner-d50daefe-7a32-4672-a930-8d18a1a9fa98-jpg.webp'},
  {brand:'LAUT',text:'designed for life.',bg:'linear-gradient(135deg,#2B3A52,#45F1FF)',img:'https://i.ibb.co/tpJjKFds/CRYSTAL-MATTER-X-Homepage-Slider.webp'},
  {brand:'JTLegend',text:'legendary protection.',bg:'linear-gradient(135deg,#7b3e19,#C0693A)',img:'https://i.ibb.co/bMcXfmWG/2160x.webp'},
  {brand:'amazingthing',text:'amazing protection.',bg:'linear-gradient(135deg,#109648,#1A1A1A)'},
  {brand:'Avocado',text:'cute & protective.',bg:'linear-gradient(135deg,#e5989b,#9d8df1)'},
];

let state={model:'iPhone 17 Pro Max',cat:'',tag:'',brand:'',search:''};
let PRODUCTS=[];
let lbSlides=[];
let lbIdx=0;

async function loadData(){
  try{
    let all=[];let offset='';let max=10;
    do{
      const url=`https://api.airtable.com/v0/${AIRTABLE_BASE}/${AIRTABLE_TABLE}?pageSize=100${offset?'&offset='+offset:''}`;
      const res=await fetch(url,{headers:{Authorization:`Bearer ${AIRTABLE_TOKEN}`}});
      const d=await res.json();
      if(d.error)throw new Error(d.error.message);
      all=[...all,...(d.records||[])];
      offset=(d.records&&d.records.length===100&&d.offset)?d.offset:'';
      max--;
    }while(offset&&max>0);
    if(!all.length)return;
    PRODUCTS=all.map((rec,i)=>{
      const f=rec.fields;
      let colors=[];try{colors=JSON.parse(f.colors_json||'[]');}catch(e){}
      const imgs=f.images||[];
      const cuts=f.case_cutout||[];
      return{id:i+1,brand:f.brand||'',name:f.name||'',model:f.model_display||'',
        models:(f.compatible_models||'').split('|').map(m=>m.trim()).filter(Boolean),
        cat:f.category||'',price:parseInt(f.price)||0,badge:f.badge||null,isCover:!!f.is_cover,
        image:imgs[0]?imgs[0].url:'',image2:imgs[1]?imgs[1].url:'',image3:imgs[2]?imgs[2].url:'',image4:imgs[3]?imgs[3].url:'',
        cutout:cuts[0]?cuts[0].url:'',
        tags:(f.tags||'').split('|').map(t=>t.trim()).filter(Boolean),
        colors,features:[f.f1,f.f2,f.f3,f.f4].filter(Boolean)};
    });
  }catch(e){console.warn('Airtable failed:',e);}
  renderFilters();
  renderBanners();
  renderGrid();
}

function renderFilters(){
  const tags=[...new Set(PRODUCTS.flatMap(p=>p.tags).filter(Boolean))].sort();
  document.getElementById('tagChips').innerHTML=tags.map(t=>`<div class="chip" onclick="setTag(this,'${t}')">${t}</div>`).join('');
  const brands=[...new Set(PRODUCTS.map(p=>p.brand).filter(Boolean))].sort();
  document.getElementById('brandChips').innerHTML=brands.map(b=>`<div class="chip" onclick="setBrand(this,'${b}')">${b}</div>`).join('');
}

function renderBanners(){
  const el=document.getElementById('bannerTrack');
  el.innerHTML=BANNERS.map(b=>`<div class="banner-card" style="background:${b.bg}" onclick="setBrandDirect('${b.brand}')">
    ${b.img?`<img src="${b.img}" alt="${b.brand}"><div class="banner-badge">${b.brand}</div>`:`<div class="banner-placeholder"><div class="b-brand">${b.brand}</div><div class="b-tag">${b.text}</div></div>`}
  </div>`).join('');
}

function setModel(el,m){
  state.model=m;
  document.querySelectorAll('#modelChips .chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
  renderGrid();
}
function setTag(el,t){
  state.tag=state.tag===t?'':t;
  document.querySelectorAll('#tagChips .chip').forEach(c=>c.classList.toggle('on',c.textContent===state.tag));
  renderGrid();
}
function setBrand(el,b){
  state.brand=state.brand===b?'':b;
  document.querySelectorAll('#brandChips .chip').forEach(c=>c.classList.toggle('brand-on',c.textContent===state.brand));
  renderGrid();
}
function setBrandDirect(b){
  state.brand=state.brand.toLowerCase()===b.toLowerCase()?'':b;
  document.querySelectorAll('#brandChips .chip').forEach(c=>c.classList.toggle('brand-on',c.textContent.toLowerCase()===state.brand.toLowerCase()));
  renderGrid();
}
function toggleSidebar(){
  const sb=document.getElementById('sidebar');
  const ov=document.getElementById('sideOverlay');
  if(window.innerWidth<=768){
    sb.classList.toggle('open');
    ov.classList.toggle('show');
  }else{
    sb.classList.toggle('collapsed');
  }
}
function applyFilters(){state.search=document.getElementById('searchInput').value.toLowerCase();renderGrid();}

function getFiltered(){
  return PRODUCTS.filter(p=>{
    if(state.model&&!p.models.includes(state.model))return false;
    if(state.tag&&!p.tags.includes(state.tag))return false;
    if(state.brand&&p.brand.toLowerCase()!==state.brand.toLowerCase())return false;
    if(state.search){const s=state.search;if(!p.name.toLowerCase().includes(s)&&!p.brand.toLowerCase().includes(s)&&!p.tags.join(' ').includes(s))return false;}
    return true;
  });
}

function renderGrid(){
  const list=getFiltered();
  document.getElementById('topInfo').innerHTML=`<span style="display:inline-flex;align-items:center;gap:6px"><span style="width:6px;height:6px;border-radius:50%;background:var(--yellow);display:inline-block"></span><strong>${state.model}</strong></span> &mdash; แสดง <strong>${list.length}</strong> รายการ`;
  const el=document.getElementById('grid');
  if(!list.length){el.innerHTML='<div class="no-results"><h3>ไม่พบสินค้า</h3><p>ลองเปลี่ยนตัวกรองดูนะคะ</p></div>';return;}
  el.innerHTML=list.map(p=>{
    const img=p.image?`<img src="${p.image}" alt="${p.name}" loading="lazy">`:`<div class="placeholder">&#9724;</div>`;
    return`<div class="card" onclick="openModal(${p.id})">
      <div class="card-img">${img}${p.badge?`<div class="card-badge badge-${p.badge}">${p.badge}</div>`:''}</div>
      <div class="card-info">
        <div class="card-brand">${p.brand}</div>
        <div class="card-name">${p.name}</div>
        <div class="card-bottom">
          <div class="card-price">฿${p.price.toLocaleString()}.-</div>
          <div class="card-dots">${p.colors.slice(0,4).map(c=>`<div class="card-dot" style="background:${c.hex}"></div>`).join('')}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function openModal(id){
  const p=PRODUCTS.find(x=>x.id===id);if(!p)return;
  lbSlides=[p.image,p.image2,p.image3,p.image4].filter(Boolean);
  const hero=document.getElementById('mHero');
  hero.innerHTML=lbSlides.length?lbSlides.map((s,i)=>`<img src="${s}" onclick="openLB(${i})" loading="lazy">`).join(''):'';
  document.getElementById('mBrand').textContent=p.brand;
  document.getElementById('mName').textContent=p.name;
  document.getElementById('mModel').textContent=p.model;
  document.getElementById('mPrice').textContent=`฿${p.price.toLocaleString()}.-`;
  document.getElementById('mTags').innerHTML=p.tags.map(t=>`<span class="modal-tag">${t}</span>`).join('');
  document.getElementById('mFeatures').innerHTML=p.features.map(f=>`<li>${f}</li>`).join('');

  const colors=MODEL_COLORS[state.model]||[];
  const ov=document.getElementById('overlaySection');
  if(ov&&p.cutout&&colors.length){
    ov.style.display='block';
    document.getElementById('overlayCase').src=p.cutout;
    document.getElementById('overlayColors').innerHTML=colors.filter(c=>c.img).map((c,i)=>`
      <button class="overlay-btn${i===0?' on':''}" onclick="pickColor(this,'${c.img}')">
        <div class="swatch" style="background:${c.hex}"></div>
        <span class="lbl">${c.color}</span>
      </button>`).join('');
    const first=colors.find(c=>c.img);
    if(first)document.getElementById('overlayPhone').src=first.img;
    else ov.style.display='none';
  }else{if(ov)ov.style.display='none';}
  document.getElementById('modalOverlay').classList.add('open');
}
function pickColor(btn,url){
  document.querySelectorAll('.overlay-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('overlayPhone').src=url;
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}

function openLB(i){lbIdx=i;document.getElementById('lbImg').src=lbSlides[i];document.getElementById('lightbox').classList.add('open');}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');}
function prevLB(){lbIdx=(lbIdx-1+lbSlides.length)%lbSlides.length;document.getElementById('lbImg').src=lbSlides[lbIdx];}
function nextLB(){lbIdx=(lbIdx+1)%lbSlides.length;document.getElementById('lbImg').src=lbSlides[lbIdx];}

window.addEventListener('load',async()=>{
  await loadData();
  setTimeout(()=>{
    document.getElementById('splash').classList.add('hide');
    setTimeout(()=>{document.getElementById('splash').remove();document.getElementById('app').classList.add('show');},500);
  },1200);
});
</script>
</body>
</html>
